name: Daily Claude Email

on:
  schedule:
    # 8am CDT (UTC-5). Fixed to UTC, so this will shift to 7am CST once
    # daylight saving ends in November (cron does not auto-adjust for DST).
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  send-daily-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily prompt script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python daily_prompt.py
